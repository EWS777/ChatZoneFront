<div>
  <h1 class="font-semibold text-2xl pt-4 text-gray-200 lg:text-3xl text-center mb-8
    md:pt-8">Filter</h1>
</div>
<div class="lg:w-[550px] lg:mx-auto">
  <div class="lg:grid lg:grid-cols-2 lg:gap-x-6">
    <div>
      <div class="pt-4 md:pt-7">
        <label class="attribute-name" for="theme">Theme:</label>
      </div>

      <div>
        <div class="relative">
          <img src="/assets/imgs/user.svg" alt="" class="input-icon">
          <select id="theme" [(ngModel)]="filter.theme" class="input-field">
            @for (theme of themeList; track theme.value) {
              <option [ngValue]="theme.value">{{theme.label}}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <div>
      <div class="pt-4 md:pt-7">
        <label class="attribute-name" for="country">Country:</label>
      </div>

      <div>
        <div class="relative">
          <img src="/assets/imgs/user.svg" alt="" class="input-icon">
          <select id="country" [(ngModel)]="filter.country" class="input-field">
            @for (country of countryList; track country.value) {
              <option [ngValue]="country.value">{{country.label}}</option>
            }
          </select>
        </div>
      </div>
    </div>


    <div>
      <div class="pt-4 md:pt-7">
        <label class="attribute-name" for="city">City:</label>
      </div>

      <div>
        <div class="relative">
          <img src="/assets/imgs/user.svg" alt="" class="input-icon">
          <select id="city" [(ngModel)]="filter.city" class="input-field">
            @for (city of cityList; track city.value) {
              <option [ngValue]="city.value">{{city.label}}</option>
            }
          </select>
        </div>
      </div>
    </div>


    <div>
      <div class="pt-4 md:pt-7">
        <label class="attribute-name" for="age">Age:</label>
      </div>

      <div>
        <div class="relative">
          <img src="/assets/imgs/user.svg" alt="" class="input-icon">
          <select id="age" [(ngModel)]="filter.age" class="input-field">
            @for (age of ageList; track age.value) {
              <option [ngValue]="age.value">{{ age.label }}</option>
            }
          </select>
        </div>
      </div>
    </div>


    <div>
      <div class="pt-4 md:pt-7">
        <label class="attribute-name" for="your-gender">Your Gender:</label>
      </div>

      <div>
        <div class="relative">
          <img src="/assets/imgs/user.svg" alt="" class="input-icon">
          <select id="your-gender" [(ngModel)]="filter.yourGender" class="input-field">
            @for (gender of genderList; track gender.value) {
              <option [ngValue]="gender.value">{{gender.label}}</option>
            }
          </select>
        </div>
      </div>
    </div>


    <div>
      <div class="pt-4 md:pt-7">
        <label class="attribute-name" for="partner-gender">Person Gender:</label>
      </div>

      <div>
        <div class="relative">
          <img src="/assets/imgs/user.svg" alt="" class="input-icon">
          <select id="partner-gender" [(ngModel)]="filter.partnerGender" class="input-field">
            @for (gender of genderList; track gender.value) {
              <option [ngValue]="gender.value">{{gender.label}}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <div>
      <div class="pt-4 md:pt-7">
        <label class="attribute-name" for="language">Language:</label>
      </div>

      <div>
        <div class="relative">
          <img src="/assets/imgs/user.svg" alt="" class="input-icon">
          <select id="language" [(ngModel)]="filter.language" class="input-field">
            @for (lang of langList; track lang.value) {
              <option [ngValue]="lang.value">{{lang.label}}</option>
            }
          </select>
        </div>
      </div>
    </div>
  </div>

  <button class="common-bottom" (click)="updateFilter()">Update</button>
</div>
